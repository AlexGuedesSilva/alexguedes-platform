server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: validate
          uri: ${VALIDATE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/validate/**

        - id: auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth/**

        - id: signer
          uri: ${SIGNER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/sign/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  rate-limit:
    capacity: 60
    window: 1m

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
